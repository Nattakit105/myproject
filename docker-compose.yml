services:
  # 1. ส่วนของตู้เซฟ (Database)
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: dorm_db
    volumes:
      - db_data:/var/lib/mysql
      - ./dorm_db.sql.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. ส่วนของเว็บแอปพลิเคชัน (PHP)
  app:
    build: .
    # --- [เพิ่มส่วนนี้] ช่วยให้ Docker หาทางออกไปโหลด Python ได้สำเร็จ ---
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # ----------------------------------------------------------
    ports:
      - "8082:80"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: dorm_db
      DB_USER: root
      DB_PASS: root_password
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor

  # 3. ส่วนของคนดูแลตู้เซฟ (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - db

# ส่วนของที่เก็บข้อมูล
volumes:
  db_data: